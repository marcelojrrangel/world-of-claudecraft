name: PR AI assist

# Two INFORMATIONAL, NON-BLOCKING jobs that help review a pull request, plus an on-demand
# comment trigger for the second one. None of this is a required check; it assists
# review, it does not gate merge. Lives in its own workflow so it never interferes with
# the CI gate in ci.yml.
#
#   screenshots        boots the Vite dev client headless, runs a fixed offline tour
#                       (character select, desktop HUD, mobile HUD), uploads the PNGs as
#                       an artifact, and links them in a sticky PR comment.
#   ai-review           reviews the PR diff with the OpenAI Codex CLI, authenticated via
#                       ChatGPT OAuth (the CODEX_AUTH_JSON secret holds a `codex login`
#                       auth.json), and posts the review as a sticky PR comment. The
#                       agent runs sandboxed read-only. No-ops without the secret (for
#                       example on a fork PR), so it never blocks.
#   ai-review-comment   on demand: an OWNER/MEMBER/COLLABORATOR comments `/review` or
#                       `/suggest <focus>` on the PR. Fetches the diff itself via the
#                       GitHub API (no checkout of the PR head, so this stays safe to run
#                       with repo secrets even against a fork PR) and posts a fresh reply
#                       comment, keyed to the triggering comment rather than the sticky
#                       review above.
#
# Setup (one time): run `codex login` locally and store ~/.codex/auth.json in the
# CODEX_AUTH_JSON repo secret to enable ai-review. Optionally set a CODEX_MODEL repo
# variable to override the Codex CLI's default model. See docs/ai-pr-bot.md, including
# the data-handling note and how to refresh an expired OAuth session.

on:
  pull_request:
  issue_comment:
    types: [created]
  workflow_dispatch:

# Needed to post the sticky review/screenshot comments and read the PR diff via the API.
# Fork PRs get a read-only token on the pull_request trigger, so the comment steps
# degrade to a no-op there (handled in the scripts). issue_comment always runs with the
# base repo's token and secrets regardless of whose PR it is, which is why
# ai-review-comment additionally gates on the commenter's author_association.
permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-ai-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  screenshots:
    name: Screenshots of changes
    runs-on: ubuntu-latest
    # issue_comment fires this workflow on every comment on any issue or PR; without this
    # guard the full checkout + npm ci + Vite boot + puppeteer run would fire on every
    # comment too, even though nothing in this job reads the comment.
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          # Full history so the diff against the PR base drives change-aware capture.
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The client imports committed-but-derived i18n tables at boot; regenerate to be safe.
      - name: Generate i18n artifacts
        run: npm run i18n:gen

      - name: Resolve a Chrome binary
        run: |
          CHROME="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium-browser || command -v chromium || true)"
          if [ -z "$CHROME" ]; then
            echo "No system Chrome on PATH; installing a Chrome for Testing build."
            CHROME="$(npx --yes puppeteer browsers install chrome | awk '{print $NF}')"
          fi
          echo "BROWSER_PATH=$CHROME" >> "$GITHUB_ENV"
          echo "Using browser: $CHROME"

      - name: Start the dev client
        run: |
          # strictPort: bind exactly 5173 or fail loudly, never silently bump the port.
          npm run dev -- --host 127.0.0.1 --port 5173 --strictPort &
          echo $! > .devpid
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:5173 >/dev/null && { echo "dev client up"; break; }
            sleep 2
          done

      # Change-aware capture: map the diff to the screens it implies (inventory, world
      # map, ...). Only on pull_request; otherwise pr_screenshots falls back to the fixed
      # tour. pr.diff is gitignored.
      - name: Compute PR diff (for change-aware capture)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: git diff --no-color "$BASE_SHA" "$HEAD_SHA" > pr.diff || true

      - name: Capture screenshots
        env:
          GAME_URL: http://127.0.0.1:5173
          SHOTS_DIR: pr-shots
          DIFF_FILE: pr.diff
        run: node scripts/pr_screenshots.mjs

      - name: Stop the dev client
        if: always()
        run: kill "$(cat .devpid)" 2>/dev/null || true

      - name: Upload screenshots
        id: upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-screenshots
          path: pr-shots/
          if-no-files-found: warn

      - name: Comment with screenshot link
        if: always() && github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHOTS_DIR: pr-shots
        run: node scripts/pr_comment_shots.mjs

  ai-review:
    name: AI review (Codex)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install the Codex CLI
        run: npm install -g @openai/codex

      - name: Compute PR diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git diff --no-color "$BASE_SHA" "$HEAD_SHA" > pr.diff || true
          echo "diff bytes: $(wc -c < pr.diff)"

      - name: Review with Codex
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
          CODEX_MODEL: ${{ vars.CODEX_MODEL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DIFF_FILE: pr.diff
        run: node scripts/ai_review.mjs

  ai-review-comment:
    name: AI review (comment command)
    runs-on: ubuntu-latest
    # Only a PR conversation comment (not a plain issue), starting with /review or
    # /suggest, from someone with write access to THIS repo. author_association is
    # evaluated against the base repo regardless of whether the PR itself is from a
    # fork, so a fork PR's own author cannot self-trigger this on their own comment.
    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association) &&
      (startsWith(github.event.comment.body, '/review') || startsWith(github.event.comment.body, '/suggest'))
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install the Codex CLI
        run: npm install -g @openai/codex

      - name: Review with Codex
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
          CODEX_MODEL: ${{ vars.CODEX_MODEL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
          COMMENT_ID: ${{ github.event.comment.id }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: node scripts/ai_review.mjs
